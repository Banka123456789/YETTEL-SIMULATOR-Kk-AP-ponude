<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yettel Banka — Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1e;--surface:#111827;--border:#1e2d45;--accent:#e84b3a;--text:#e8eaf0;--muted:#7a8ba0;--green:#10b981;--blue:#3b82f6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(232,75,58,.07) 0%,transparent 60%),
             radial-gradient(ellipse 60% 40% at 80% 90%,rgba(59,130,246,.05) 0%,transparent 50%);}
.wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem;position:relative;z-index:1;}
header{text-align:center;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.badge{display:inline-block;background:rgba(232,75,58,.12);border:1px solid rgba(232,75,58,.3);color:var(--accent);font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:.25rem .9rem;border-radius:100px;margin-bottom:.8rem;}
h1{font-family:"DM Serif Display",serif;font-size:clamp(1.6rem,4vw,2.4rem);line-height:1.1;margin-bottom:.4rem;background:linear-gradient(135deg,#fff 0%,#a0b0c8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub{color:var(--muted);font-size:.82rem;}
#chat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.2rem;min-height:200px;display:flex;flex-direction:column;gap:.7rem;margin-bottom:1rem;}
.msg{display:flex;flex-direction:column;gap:.12rem;animation:pop .22s ease;}
.msg.agent{align-items:flex-end;}.msg.client{align-items:flex-start;}
@keyframes pop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.lbl{font-size:.63rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:0 .3rem;}
.msg.agent .lbl{color:var(--accent);}.msg.client .lbl{color:var(--blue);}
.bbl{max-width:88%;padding:.7rem .95rem;font-size:.86rem;line-height:1.65;border-radius:13px;}
.msg.agent .bbl{background:rgba(232,75,58,.1);border:1px solid rgba(232,75,58,.22);border-bottom-right-radius:3px;}
.msg.client .bbl{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.22);border-bottom-left-radius:3px;}
.tip-box{border-radius:7px;padding:.5rem .85rem;font-size:.76rem;line-height:1.5;animation:pop .22s ease;margin:0 auto;max-width:90%;text-align:center;}
.tip-box.ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:#6ee7b7;}
.tip-box.err{background:rgba(232,75,58,.08);border:1px solid rgba(232,75,58,.2);color:#fca5a5;}
#start-wrap{text-align:center;padding:2rem 0;}
#start-wrap p{color:var(--muted);font-size:.85rem;margin-bottom:1.2rem;}
.start-btn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:.75rem 2rem;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:.9rem;font-weight:600;transition:all .15s;}
.start-btn:hover{background:#d43d2e;transform:translateY(-1px);}
#opts{display:flex;flex-direction:column;gap:.4rem;}
.opt-lbl{font-size:.67rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.1rem;}
.opt-btn{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:9px;padding:.65rem 1rem;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:.84rem;color:var(--text);text-align:left;transition:all .15s;display:flex;align-items:center;gap:.6rem;animation:pop .2s ease;}
.opt-btn::before{content:"👤";font-size:.85rem;flex-shrink:0;}
.opt-btn:hover{background:rgba(59,130,246,.18);border-color:rgba(59,130,246,.5);transform:translateX(3px);}
#restart{display:none;text-align:center;margin-top:.8rem;}
.restart-btn{background:rgba(232,75,58,.1);border:1px solid rgba(232,75,58,.3);color:var(--accent);border-radius:7px;padding:.5rem 1.2rem;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:.8rem;font-weight:600;transition:all .15s;}
.restart-btn:hover{background:rgba(232,75,58,.2);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
</style>
</head>

var curScen="main";
function startScenario(){document.getElementById("chat").innerHTML="";document.getElementById("opts").innerHTML="";document.getElementById("restart").style.display="none";showNode(SCEN[curScen].start);}
function showNode(id){
  var node=SCEN[curScen].nodes[id];
  if(!node){console.error("Missing node:",id);return;}
  var chat=document.getElementById("chat");
  var opts=document.getElementById("opts");
  chat.appendChild(makeBbl("agent","Agent — Maja",node.a));
  if(node.tip){var tip=document.createElement("div");tip.className="tip-box "+node.tip.t;tip.textContent=node.tip.s;chat.appendChild(tip);}
  chat.scrollTop=chat.scrollHeight;
  opts.innerHTML="";
  if(node.end||!node.o||node.o.length===0){document.getElementById("restart").style.display="block";setTimeout(function(){document.getElementById("restart").scrollIntoView({behavior:"smooth",block:"nearest"});},150);return;}
  setTimeout(function(){
    var lbl=document.createElement("div");lbl.className="opt-lbl";lbl.textContent="Šta klijent kaže:";opts.appendChild(lbl);
    node.o.forEach(function(opt){var btn=document.createElement("button");btn.className="opt-btn";btn.textContent=opt.l;btn.onclick=(function(o){return function(){pickOption(o);};})(opt);opts.appendChild(btn);});
    opts.scrollIntoView({behavior:"smooth",block:"nearest"});
  },280);
}
function pickOption(opt){var chat=document.getElementById("chat");document.getElementById("opts").innerHTML="";chat.appendChild(makeBbl("client","Klijent",opt.l));chat.scrollTop=chat.scrollHeight;setTimeout(function(){showNode(opt.n);},380);}
function makeBbl(type,label,text){var wrap=document.createElement("div");wrap.className="msg "+type;var lbl=document.createElement("div");lbl.className="lbl";lbl.textContent=label;var bbl=document.createElement("div");bbl.className="bbl";bbl.textContent=text;wrap.appendChild(lbl);wrap.appendChild(bbl);return wrap;}
startScenario();
</script>
